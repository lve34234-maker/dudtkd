<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>조윤수 사범님께</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Nanum+Pen+Script&family=Do+Hyeon&family=Black+Han+Sans&family=Gaegu&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#c9a84c;--gold2:#e8c96a;--dred:#8b1a1a;
  --ink:#0d0a06;--parch:#f5ead8;--cream:#fdf6e8;
  --note:#d4a96a;--nline:#b8855a;--tape:rgba(210,180,130,.65);
  --acc:#7c6ef5;--p1:#12101a;--p2:#1e1b2e;--p3:#2a273e;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{overflow-y:scroll;height:100%}
body{font-family:'Nanum Myeongjo',serif;background:var(--ink);height:100%}

/* ── LOADING ── */
#ls{position:fixed;inset:0;background:var(--ink);display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:18px;transition:opacity .7s}
#ls.hide{opacity:0;pointer-events:none}
.lt{font-size:1.6rem;font-weight:800;color:var(--parch);letter-spacing:.05em}
.ld{display:flex;gap:8px}
.ld span{width:8px;height:8px;border-radius:50%;background:var(--gold);opacity:.3;animation:dp 1.2s ease-in-out infinite}
.ld span:nth-child(2){animation-delay:.2s}.ld span:nth-child(3){animation-delay:.4s}
@keyframes dp{0%,100%{opacity:.3}50%{opacity:1}}

/* ── HERO ── */
.hero{height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%,#1a1006 0%,#080604 60%,#020202 100%)}
.hero::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 70% 40%,rgba(201,168,76,.06) 0%,transparent 60%);pointer-events:none}
/* 골드 그리드 라인 */
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(201,168,76,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(201,168,76,.04) 1px,transparent 1px);background-size:60px 60px;pointer-events:none}
/* 파티클 */
.particles{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.particle{position:absolute;border-radius:50%;background:var(--gold);opacity:0;animation:float var(--dur,8s) var(--delay,0s) ease-in-out infinite}
@keyframes float{0%,100%{opacity:0;transform:translateY(0) scale(0)}20%{opacity:.4}50%{opacity:.15;transform:translateY(-80px) scale(1)}80%{opacity:.3}100%{opacity:0;transform:translateY(-160px) scale(0)}}
/* 장식 원 */
.deco-ring{position:absolute;border-radius:50%;border:1px solid rgba(201,168,76,.07);top:50%;left:50%;transform:translate(-50%,-50%);animation:spn 50s linear infinite}
@keyframes spn{to{transform:translate(-50%,-50%) rotate(360deg)}}

.hi{text-align:center;z-index:2;animation:fu 1.4s ease both;padding:0 24px}
@keyframes fu{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
.hbadge{display:inline-block;border:1px solid rgba(201,168,76,.5);color:var(--gold);font-size:.75rem;letter-spacing:.4em;padding:6px 20px;margin-bottom:32px;font-family:'Do Hyeon',sans-serif;opacity:.85;position:relative}
.hbadge::before,.hbadge::after{content:'◆';font-size:.5rem;position:absolute;top:50%;transform:translateY(-50%);color:var(--gold);opacity:.6}
.hbadge::before{left:-14px}.hbadge::after{right:-14px}
.htitle{font-size:clamp(3rem,9vw,7.5rem);font-weight:800;color:transparent;line-height:1.05;margin-bottom:12px;background:linear-gradient(135deg,#e8c96a 0%,#c9a84c 40%,#f5ead8 60%,#c9a84c 80%,#a07830 100%);-webkit-background-clip:text;background-clip:text;text-shadow:none;filter:drop-shadow(0 0 30px rgba(201,168,76,.3))}
.hsub{font-family:'Nanum Pen Script',cursive;font-size:clamp(1.2rem,3.5vw,2rem);color:rgba(245,234,216,.7);letter-spacing:.05em;margin-bottom:44px}
/* 가로 구분선 */
.hdivider{width:120px;height:1px;background:linear-gradient(to right,transparent,var(--gold),transparent);margin:0 auto 32px;opacity:.5}
.sh{display:flex;flex-direction:column;align-items:center;gap:8px;color:rgba(201,168,76,.4);font-size:.75rem;letter-spacing:.25em;animation:pulse 2.4s ease-in-out infinite;font-family:'Do Hyeon',sans-serif}
.sh svg{width:20px;opacity:.4;animation:bnc 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.38}50%{opacity:.8}}
@keyframes bnc{0%,100%{transform:translateY(0)}50%{transform:translateY(7px)}}

/* ── LETTER PAGE ── */
.lpage{height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}

/* 고급 배경 */
.lpage-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 20% 50%,#1a1208 0%,#0d0a06 50%,#060504 100%)}
.lpage-bg::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 80% 30%,rgba(201,168,76,.05) 0%,transparent 55%)}

/* 좌측 떠다니는 사진들 */
.float-photos{position:absolute;left:0;top:0;width:300px;height:100%;pointer-events:none;overflow:visible;z-index:1}
body.mob .float-photos{display:none}
.fphoto{position:absolute;border-radius:8px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.7),0 0 0 1px rgba(201,168,76,.2),inset 0 0 0 1px rgba(255,255,255,.04);opacity:0;animation:fphotoFloat var(--fdur,12s) var(--fdelay,0s) ease-in-out infinite;will-change:transform,opacity}
.fphoto img{width:100%;height:100%;object-fit:cover;display:block}
.fphoto-placeholder{width:100%;height:100%;background:rgba(201,168,76,.06);display:flex;align-items:center;justify-content:center;color:rgba(201,168,76,.2);font-size:1.5rem}
@keyframes fphotoFloat{
  0%{opacity:0;transform:translateY(10px) scale(.96) rotate(-1deg)}
  8%{opacity:.8}
  45%{opacity:.7;transform:translateY(-20px) scale(1) rotate(.5deg)}
  55%{opacity:.7;transform:translateY(-25px) scale(1.01) rotate(-.5deg)}
  92%{opacity:.6}
  100%{opacity:0;transform:translateY(-60px) scale(.97) rotate(1deg)}
}

/* 우측 장식 */
.side-deco{position:absolute;right:20px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:8px;z-index:1;opacity:.3}
body.mob .side-deco{display:none}
.side-deco span{font-family:'Do Hyeon',sans-serif;font-size:.58rem;letter-spacing:.3em;color:var(--gold);writing-mode:vertical-rl;text-orientation:mixed}

.pno{position:absolute;top:14px;left:50%;transform:translateX(-50%);font-family:'Do Hyeon',sans-serif;font-size:.68rem;color:rgba(201,168,76,.25);letter-spacing:.35em;z-index:5}

/* 골드 구분선 장식 (상단/하단) */
.page-line-top,.page-line-bot{position:absolute;left:50%;transform:translateX(-50%);z-index:3;display:flex;align-items:center;gap:8px}
.page-line-top{top:14px}.page-line-bot{bottom:14px}
.page-line-top::after,.page-line-bot::after{content:'';display:block;width:60px;height:1px;background:linear-gradient(to right,transparent,rgba(201,168,76,.3),transparent)}
.page-line-top::before,.page-line-bot::before{content:'';display:block;width:60px;height:1px;background:linear-gradient(to left,transparent,rgba(201,168,76,.3),transparent)}

/* ── 카드 래퍼 ── */
.cw{display:flex;align-items:center;justify-content:center;width:min(820px,90vw);height:min(500px,78vh);position:relative;z-index:2}

/* ── 사진 ── */
.ps{width:44%;height:100%;position:relative;flex-shrink:0;z-index:3}
.pf{width:100%;height:100%;border-radius:8px;overflow:hidden;position:relative;box-shadow:-8px 8px 0 rgba(0,0,0,.4),0 0 0 1px rgba(201,168,76,.12),6px -4px 24px rgba(0,0,0,.5)}
.pf img.pimg{width:100%;height:100%;object-fit:cover;display:none}
.pf img.pimg.on{display:block}
.pph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
.pf.on .pph{display:none}
.pph svg{width:44px;opacity:.3;color:rgba(255,255,255,.8)}
.pph span{font-family:'Do Hyeon',sans-serif;font-size:.75rem;color:rgba(255,255,255,.35);letter-spacing:.18em}

/* ── 노트 ── */
.ns{width:54%;height:106%;position:relative;flex-shrink:0;margin-left:-22px;z-index:2;perspective:1200px}
.flipper{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .75s cubic-bezier(.4,0,.2,1)}
.flipper.flipped{transform:rotateY(180deg)}
.front,.back{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:4px;overflow:hidden}
.front{display:flex;flex-direction:column;padding:52px 28px 20px;box-shadow:8px 8px 0 rgba(0,0,0,.3),0 0 0 1px rgba(201,168,76,.1),-2px -2px 14px rgba(0,0,0,.2)}
.front::before{content:'';position:absolute;top:-10px;left:50%;transform:translateX(-50%) rotate(-1.5deg);width:88px;height:28px;background:var(--tape);border-radius:2px;box-shadow:0 2px 8px rgba(0,0,0,.15);z-index:10}
.holes{position:absolute;top:14px;left:50%;transform:translateX(-50%);display:flex;gap:13px;z-index:11}
.holes span{width:9px;height:9px;border-radius:50%;background:rgba(0,0,0,.35);box-shadow:inset 0 1px 3px rgba(0,0,0,.4)}
.lines{position:absolute;inset:0;pointer-events:none}
.lines::after{content:'';position:absolute;top:58px;left:0;right:0;bottom:0;background-image:repeating-linear-gradient(to bottom,transparent,transparent 31px,rgba(0,0,0,.1) 32px)}
.nfrom{font-family:'Do Hyeon',sans-serif;font-size:.82rem;letter-spacing:.22em;margin-bottom:8px;position:relative;z-index:2}
.nbody{line-height:2;flex:1;overflow-y:auto;position:relative;z-index:2;word-break:keep-all;white-space:pre-wrap;scrollbar-width:none}
.nbody::-webkit-scrollbar{display:none}
.nbody.empty::before{content:'아직 편지가 없어요...';opacity:.3;font-size:.95rem;font-family:'Nanum Myeongjo',serif}
.fhint{display:none;position:absolute;bottom:10px;right:12px;font-family:'Do Hyeon',sans-serif;font-size:.58rem;opacity:.3;letter-spacing:.1em;pointer-events:none;z-index:3}
.hasvid .fhint{display:block}

/* 음성 플레이어 */
.vp-wrap{margin-top:8px;position:relative;z-index:2}
.vp-row{display:none;align-items:center;gap:8px;border-radius:3px;padding:6px 10px}
.vp-row.on{display:flex}
.vp-play{width:28px;height:28px;border-radius:50%;background:rgba(60,25,5,.28);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s}
.vp-play:hover{background:rgba(60,25,5,.45)}
.vp-play svg{width:11px;fill:rgba(255,240,210,.9)}
.vp-track{flex:1;display:flex;flex-direction:column;gap:3px;min-width:0}
.vp-label{font-family:'Do Hyeon',sans-serif;font-size:.58rem;opacity:.48;letter-spacing:.07em}
.vp-bar{width:100%;height:3px;background:rgba(60,25,5,.18);border-radius:2px;cursor:pointer}
.vp-fill{height:100%;background:rgba(60,25,5,.45);border-radius:2px;width:0%}
.vp-time{font-family:'Do Hyeon',sans-serif;font-size:.56rem;opacity:.35}

/* 뒷면 */
.back{background:#0d0a06;transform:rotateY(180deg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:16px;border:1px solid rgba(201,168,76,.1)}
.back video,.back iframe{width:100%;height:70%;border:none;border-radius:4px;background:#000}
.back-close{font-family:'Do Hyeon',sans-serif;font-size:.72rem;letter-spacing:.18em;color:rgba(201,168,76,.55);background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.2);padding:6px 22px;cursor:pointer;border-radius:3px;transition:all .2s}
.back-close:hover{color:var(--gold);border-color:var(--gold)}
.back-name{font-family:'Do Hyeon',sans-serif;font-size:.65rem;color:rgba(201,168,76,.3);letter-spacing:.15em}

/* 관리자 카드 테두리 */
.admin-active .front{cursor:pointer;transition:outline-color .2s;outline:2px dashed transparent;outline-offset:3px}
.admin-active .front:hover{outline-color:rgba(124,110,245,.6)}

/* ── ADD / FOOTER PAGE ── */
.apage{height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.apage-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 50%,#14110a,#070604)}
.nadmin{display:flex;flex-direction:column;align-items:center;gap:10px;color:rgba(201,168,76,.2);font-family:'Do Hyeon',sans-serif;font-size:.82rem;letter-spacing:.2em;z-index:2}
.admin-active .nadmin{display:none}
.aapi{display:none;flex-direction:column;align-items:center;gap:14px;z-index:2}
.admin-active .aapi{display:flex}
.addBtn{padding:16px 44px;background:transparent;border:1px solid rgba(201,168,76,.3);color:rgba(201,168,76,.5);font-family:'Do Hyeon',sans-serif;font-size:.88rem;letter-spacing:.25em;cursor:pointer;border-radius:2px;transition:all .2s;position:relative}
.addBtn:hover{border-color:var(--gold);color:var(--gold);box-shadow:0 0 20px rgba(201,168,76,.1)}
.fpage{height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;flex-direction:column;gap:14px}
.fpage-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 60%,#120e08,#050403)}
.ftitle{font-family:'Nanum Pen Script',cursive;font-size:clamp(1.8rem,5vw,3.4rem);color:var(--gold);opacity:.75;z-index:2}
.fsub{font-family:'Do Hyeon',sans-serif;font-size:.75rem;letter-spacing:.3em;color:rgba(201,168,76,.25);z-index:2}
.fgold{z-index:2;width:60px;height:1px;background:linear-gradient(to right,transparent,var(--gold),transparent);opacity:.4}

/* ── TOAST ── */
.toast{position:fixed;bottom:72px;right:20px;background:rgba(12,10,6,.95);color:var(--gold);font-family:'Do Hyeon',sans-serif;font-size:.7rem;letter-spacing:.14em;padding:7px 16px;border-radius:2px;z-index:3000;opacity:0;transition:opacity .3s;pointer-events:none;border:1px solid rgba(201,168,76,.2)}
.toast.on{opacity:1}

/* ── ADMIN BTN ── */
.adminbtn{position:fixed;bottom:22px;right:22px;width:40px;height:40px;border-radius:50%;border:1px solid rgba(201,168,76,.25);background:rgba(12,10,6,.9);backdrop-filter:blur(8px);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:900;transition:border-color .3s,transform .2s,box-shadow .3s}
.adminbtn:hover{border-color:var(--gold);transform:scale(1.1);box-shadow:0 0 16px rgba(201,168,76,.2)}
.adminbtn svg{width:15px;opacity:.45;transition:opacity .3s}
.adminbtn:hover svg{opacity:1}
.admin-active .adminbtn{border-color:var(--dred);background:rgba(139,26,26,.2)}
.admin-active .adminbtn svg{opacity:1}

/* ── ADMIN BADGE ── */
.abadge{position:fixed;top:14px;left:50%;transform:translateX(-50%) translateY(-70px);background:linear-gradient(135deg,#7c6ef5,#9c5ef5);color:#fff;font-family:'Do Hyeon',sans-serif;font-size:.72rem;letter-spacing:.15em;padding:8px 24px;z-index:999;box-shadow:0 4px 24px rgba(124,110,245,.4);transition:transform .4s cubic-bezier(.22,.68,0,.99);pointer-events:none;white-space:nowrap;border-radius:20px}
.abadge.on{transform:translateX(-50%) translateY(0)}

/* ══════════════════════════════
   편집 패널
══════════════════════════════ */
#ePanel{
  position:fixed;right:0;top:0;bottom:0;width:300px;
  background:var(--p1);z-index:1500;
  transform:translateX(320px);
  transition:transform .35s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;
  box-shadow:-8px 0 50px rgba(0,0,0,.7);
  overflow:hidden;
  border-left:1px solid rgba(201,168,76,.08);
}
#ePanel.on{transform:translateX(0)}
.ep-hd{padding:16px 18px 14px;background:var(--p2);border-bottom:1px solid rgba(255,255,255,.05);display:flex;align-items:center;gap:10px;flex-shrink:0}
.ep-title{font-family:'Do Hyeon',sans-serif;font-size:.88rem;color:rgba(255,255,255,.8);letter-spacing:.12em;flex:1}
.ep-close{background:none;border:none;color:rgba(255,255,255,.35);cursor:pointer;font-size:1.2rem;padding:4px;line-height:1;transition:color .2s}
.ep-close:hover{color:#fff}
.ep-tag{font-family:'Do Hyeon',sans-serif;font-size:.68rem;color:var(--gold);letter-spacing:.1em;background:rgba(201,168,76,.1);padding:2px 8px;border-radius:10px;border:1px solid rgba(201,168,76,.2)}
.ep-body{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:12px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.08) transparent}
.ep-sec{background:var(--p2);border-radius:8px;padding:12px 14px;display:flex;flex-direction:column;gap:9px;border:1px solid rgba(255,255,255,.04)}
.ep-sec-t{font-family:'Do Hyeon',sans-serif;font-size:.63rem;color:rgba(201,168,76,.5);letter-spacing:.2em}
.ep-lbl{font-family:'Do Hyeon',sans-serif;font-size:.6rem;color:rgba(255,255,255,.35);letter-spacing:.1em}
.ep-ta{width:100%;background:var(--p3);border:1px solid rgba(255,255,255,.07);border-radius:6px;color:rgba(255,255,255,.82);font-family:'Nanum Pen Script',cursive;font-size:1.1rem;padding:10px 12px;resize:none;outline:none;line-height:1.7;min-height:90px;transition:border-color .2s}
.ep-ta:focus{border-color:var(--acc)}
.ep-in{width:100%;background:var(--p3);border:1px solid rgba(255,255,255,.07);border-radius:6px;color:rgba(255,255,255,.82);font-family:'Do Hyeon',sans-serif;font-size:.82rem;padding:8px 12px;outline:none;transition:border-color .2s;letter-spacing:.1em}
.ep-in:focus{border-color:var(--acc)}
.ep-fonts{display:flex;gap:5px;flex-wrap:wrap}
.ep-fb{padding:5px 10px;background:var(--p3);border:1.5px solid transparent;color:rgba(255,255,255,.5);font-size:.78rem;cursor:pointer;border-radius:5px;transition:all .2s;white-space:nowrap}
.ep-fb.on{border-color:var(--acc);color:#fff;background:rgba(124,110,245,.18)}
.ep-fb:hover{border-color:rgba(124,110,245,.4)}
.ep-slider{width:100%;accent-color:var(--acc);cursor:pointer}
.ep-colors{display:grid;grid-template-columns:repeat(8,1fr);gap:5px}
.ep-cb{width:100%;aspect-ratio:1;border-radius:4px;border:2px solid transparent;cursor:pointer;transition:transform .15s,border-color .15s}
.ep-cb:hover{transform:scale(1.15)}
.ep-cb.on{border-color:#fff;transform:scale(1.1)}
.ep-row{display:flex;align-items:center;gap:8px}
.ep-ub{width:100%;padding:8px;background:var(--p3);border:1.5px dashed rgba(255,255,255,.15);color:rgba(255,255,255,.5);font-family:'Do Hyeon',sans-serif;font-size:.72rem;letter-spacing:.1em;cursor:pointer;border-radius:6px;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px}
.ep-ub:hover{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.05)}
.ep-db{width:100%;padding:8px;background:transparent;color:rgba(220,80,80,.55);font-family:'Do Hyeon',sans-serif;font-size:.68rem;letter-spacing:.1em;border:1px solid rgba(220,80,80,.2);border-radius:6px;cursor:pointer;transition:all .2s}
.ep-db:hover{background:rgba(220,80,80,.08);color:rgba(220,80,80,.85)}
.ep-save{width:100%;padding:11px;background:linear-gradient(135deg,#7c6ef5,#9c5ef5);color:#fff;font-family:'Do Hyeon',sans-serif;font-size:.82rem;letter-spacing:.15em;border:none;border-radius:8px;cursor:pointer;transition:opacity .2s;box-shadow:0 4px 16px rgba(124,110,245,.3)}
.ep-save:hover{opacity:.88}
.ep-tabs{display:flex;gap:4px}
.ep-tab{padding:4px 10px;background:var(--p3);border:1.5px solid transparent;color:rgba(255,255,255,.4);font-family:'Do Hyeon',sans-serif;font-size:.62rem;cursor:pointer;border-radius:4px;transition:all .2s}
.ep-tab.on{border-color:var(--acc);color:#fff;background:rgba(124,110,245,.16)}
.ep-vfile,.ep-vurl{display:flex;flex-direction:column;gap:5px}
.ep-vfile.hide,.ep-vurl.hide{display:none}
/* 떠다니는 사진 관리 섹션 */
.fp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.fp-thumb{aspect-ratio:1;border-radius:5px;overflow:hidden;position:relative;border:1px solid rgba(201,168,76,.15);cursor:pointer;transition:border-color .2s}
.fp-thumb:hover{border-color:rgba(220,80,80,.5)}
.fp-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.fp-thumb .fp-del{position:absolute;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;color:#fff;font-size:.7rem;font-family:'Do Hyeon',sans-serif}
.fp-thumb:hover .fp-del{display:flex}

/* 모바일 */
body.mob .cw{flex-direction:column;width:min(420px,92vw);height:min(680px,88vh)}
body.mob .ps{width:100%;height:38%;flex-shrink:0}

</style>

<script>
const API = 'YOUR_RAILWAY_URL';
const PW  = 'love';
const isMob = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent)||window.innerWidth<768;
if(isMob) document.body.classList.add('mob');

function $(id){ return document.getElementById(id); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(m){ const t=$('toast'); t.textContent=m; t.classList.add('on'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('on'),2400); }
function openMo(id){ $(id).classList.add('on'); }
function closeMo(id){ $(id).classList.remove('on'); }
document.querySelectorAll('.mo').forEach(m=>m.addEventListener('click',e=>{ if(e.target===m) m.classList.remove('on'); }));

function toEmbed(u){
  if(!u)return null;
  if(u.includes('youtube.com/embed/'))return u;
  let m=u.match(/youtu\.be\/([^?&]+)/); if(m)return`https://www.youtube.com/embed/${m[1]}?autoplay=1`;
  m=u.match(/[?&]v=([^?&]+)/); if(m)return`https://www.youtube.com/embed/${m[1]}?autoplay=1`;
  m=u.match(/shorts\/([^?&]+)/); if(m)return`https://www.youtube.com/embed/${m[1]}?autoplay=1`;
  return u;
}
function isDirect(u){ return u&&!u.includes('youtube')&&!u.includes('youtu.be'); }

// API
async function apiLoad(){ const r=await fetch(`${API}/api/letters`); if(!r.ok)throw new Error(); return r.json(); }
async function apiSave(d){ toast('저장 중...'); try{ const r=await fetch(`${API}/api/letters`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)}); if(!r.ok)throw new Error(); toast('저장 완료 ✓'); } catch(e){ toast('저장 실패 ✗'); } }

let letters=[], adminMode=false, editIdx=-1, draft={};
// 떠다니는 사진은 localStorage에 저장 (서버 용량 절약)
let fphotos = [];
try{ const saved=localStorage.getItem('sabeomnim_fphotos'); if(saved) fphotos=JSON.parse(saved); }catch(e){}
function saveFphotos(){ try{localStorage.setItem('sabeomnim_fphotos',JSON.stringify(fphotos));}catch(e){toast('사진 저장 공간이 부족해요');} }
const audioEls={};
function defStyle(){ return{fontFamily:'Nanum Pen Script',fontSize:1.4,textColor:'#3a1f05',noteColor:'#d4a96a',photoColor:'#c94a42'}; }

// ── 파티클 생성 ──
function makeParticles(){
  const con=$('heroParticles'); if(!con) return;
  for(let i=0;i<18;i++){
    const p=document.createElement('div');
    p.className='particle';
    const size=1.5+Math.random()*3;
    p.style.cssText=`width:${size}px;height:${size}px;left:${5+Math.random()*90}%;bottom:${-10+Math.random()*10}%;--dur:${7+Math.random()*10}s;--delay:${Math.random()*8}s`;
    con.appendChild(p);
  }
}
makeParticles();

// ── 떠다니는 사진 렌더 ──
function renderFloatPhotos(container){
  container.innerHTML='';
  if(!fphotos.length) return;
  const slots=[
    {w:100,h:130,left:'8%',top:'8%',delay:'0s',dur:'14s'},
    {w:80,h:100,left:'55%',top:'25%',delay:'3s',dur:'12s'},
    {w:110,h:140,left:'15%',top:'50%',delay:'6s',dur:'16s'},
    {w:75,h:95,left:'60%',top:'60%',delay:'1.5s',dur:'11s'},
    {w:90,h:115,left:'5%',top:'72%',delay:'4s',dur:'13s'},
    {w:85,h:105,left:'50%',top:'82%',delay:'7s',dur:'15s'},
  ];
  slots.forEach((sl,idx)=>{
    const src=fphotos[idx%fphotos.length];
    const div=document.createElement('div');
    div.className='fphoto';
    div.style.cssText=`width:${sl.w}px;height:${sl.h}px;left:${sl.left};top:${sl.top};--fdelay:${sl.delay};--fdur:${sl.dur}`;
    const img=document.createElement('img');
    img.src=src; img.style.cssText='width:100%;height:100%;object-fit:cover;display:block';
    div.appendChild(img);
    container.appendChild(div);
  });
}

// ── RENDER ──
function render(){
  const con=$('pages'); con.innerHTML='';
  letters.forEach((l,i)=>{
    const sty={...defStyle(),...(l.style||{})};
    const hasPhoto=!!l.photo,hasAudio=!!l.audio,hasVideo=!!l.video,isEmpty=!l.body.trim();
    const page=document.createElement('div');
    page.className='lpage';
    page.innerHTML=`
      <div class="lpage-bg"></div>
      <div class="float-photos" id="fp${i}"></div>
      <div class="side-deco"><span>사범님께</span><span>◆</span><span>감사합니다</span></div>
      <div class="pno">No.${String(i+1).padStart(2,'0')}</div>
      <div class="page-line-top"></div>
      <div class="page-line-bot"></div>
      <div class="cw">
        <div class="ps">
          <div class="pf${hasPhoto?' on':''}" id="pf${i}" style="background:${sty.photoColor}">
            <img class="pimg${hasPhoto?' on':''}" id="pi${i}" src="${hasPhoto?l.photo:''}" alt="">
            <div class="pph"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="8.5" cy="10.5" r="1.5"/><path d="M21 15l-5-5L5 19"/></svg><span>사진 없음</span></div>
          </div>
        </div>
        <div class="ns">
          <div class="flipper" id="flip${i}">
            <div class="front${hasVideo?' hasvid':''}" id="fr${i}" style="background:${sty.noteColor}">
              <div class="holes">${Array(6).fill('<span></span>').join('')}</div>
              <div class="lines"></div>
              <div class="nfrom" style="color:${sty.textColor}">${esc(l.from)}</div>
              <div class="nbody${isEmpty?' empty':''}" style="font-family:'${sty.fontFamily}',cursive;font-size:${sty.fontSize}rem;color:${sty.textColor}">${isEmpty?'':esc(l.body)}</div>
              ${hasAudio?`<div class="vp-wrap"><div class="vp-row on" id="vpr${i}"><button class="vp-play" id="vpp${i}"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button><div class="vp-track"><div class="vp-label" style="color:${sty.textColor}">🎙 ${esc(l.from)}의 음성</div><div class="vp-bar" id="vpb${i}"><div class="vp-fill" id="vpf${i}"></div></div><div class="vp-time" id="vpt${i}" style="color:${sty.textColor}">0:00/0:00</div></div></div></div>`:''}
              <div class="fhint" style="color:${sty.textColor}">🎬 눌러서 영상편지 보기</div>
            </div>
            <div class="back" id="bk${i}">
              <div class="back-name">🎬 ${esc(l.from)}의 영상편지</div>
              <div id="bkv${i}" style="width:100%;height:70%"></div>
              <button class="back-close" id="bkc${i}">✕ 편지로 돌아가기</button>
            </div>
          </div>
        </div>
      </div>`;
    con.appendChild(page);
    // 떠다니는 사진
    renderFloatPhotos(page.querySelector(`#fp${i}`));
    wireCard(page,i);
  });
  document.body.classList.toggle('admin-active',adminMode);
}

function wireCard(page,i){
  page.querySelector(`#fr${i}`).addEventListener('click',e=>{
    if(e.target.closest('.vp-play,.vp-bar')) return;
    if(adminMode){ openEditor(i); }
    else if(letters[i].video){ flipTo(i,page); }
  });
  page.querySelector(`#bkc${i}`).addEventListener('click',e=>{ e.stopPropagation(); flipBack(i,page); });
  wireAudio(page,i);
}

function flipTo(i,page){
  const bkv=page.querySelector(`#bkv${i}`), url=letters[i].video, embed=toEmbed(url);
  bkv.innerHTML='';
  if(isDirect(url)){
    const v=document.createElement('video'); v.src=url; v.controls=true; v.autoplay=true; v.playsInline=true;
    v.style.cssText='width:100%;height:100%;border-radius:4px;background:#000'; bkv.appendChild(v);
  } else {
    const f=document.createElement('iframe'); f.src=embed; f.allow='autoplay;fullscreen'; f.allowFullscreen=true;
    f.style.cssText='width:100%;height:100%;border:none;border-radius:4px'; bkv.appendChild(f);
  }
  page.querySelector(`#flip${i}`).classList.add('flipped');
}
function flipBack(i,page){
  page.querySelector(`#flip${i}`).classList.remove('flipped');
  setTimeout(()=>{ const b=page.querySelector(`#bkv${i}`); if(b) b.innerHTML=''; },800);
}

function wireAudio(page,i){
  if(!letters[i].audio) return;
  if(audioEls[i]){ audioEls[i].pause(); audioEls[i].remove(); }
  const a=new Audio(); a.preload='metadata'; a.src=letters[i].audio;
  document.body.appendChild(a); audioEls[i]=a;
  const vpf=page.querySelector(`#vpf${i}`),vpb=page.querySelector(`#vpb${i}`),vpt=page.querySelector(`#vpt${i}`),vpp=page.querySelector(`#vpp${i}`);
  if(!vpp) return;
  function fmt(s){ if(!isFinite(s)||isNaN(s))return'0:00'; return`${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`; }
  a.addEventListener('timeupdate',()=>{ const p=a.duration?(a.currentTime/a.duration)*100:0; if(vpf)vpf.style.width=p+'%'; if(vpt)vpt.textContent=`${fmt(a.currentTime)}/${fmt(a.duration)}`; });
  a.addEventListener('ended',()=>{ vpp.innerHTML='<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>'; if(vpf)vpf.style.width='0%'; });
  vpp.addEventListener('click',e=>{
    e.stopPropagation();
    if(a.paused){
      Object.values(audioEls).forEach(x=>{ if(x!==a) x.pause(); });
      document.querySelectorAll('.vp-play').forEach(b=>b.innerHTML='<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>');
      a.play().catch(()=>{});
      vpp.innerHTML='<svg viewBox="0 0 24 24"><path d="M6 4h4v16H6zM14 4h4v16h-4z"/></svg>';
    } else { a.pause(); vpp.innerHTML='<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>'; }
  });
  if(vpb) vpb.addEventListener('click',e=>{ e.stopPropagation(); const r=vpb.getBoundingClientRect(); if(a.duration)a.currentTime=((e.clientX-r.left)/r.width)*a.duration; });
}

// ════════════════════════
//  편집 패널
// ════════════════════════
const panel=$('ePanel');
function openEditor(i){
  editIdx=i;
  const l=letters[i], sty={...defStyle(),...(l.style||{})};
  draft={ photo:l.photo, audio:l.audio, video:l.video };

  $('epTag').textContent=l.from;
  $('epName').value=l.from;
  $('epBody').value=l.body;
  document.querySelectorAll('#epFonts .ep-fb').forEach(b=>b.classList.toggle('on',b.dataset.f===sty.fontFamily));
  $('epSize').value=sty.fontSize||1.4;
  document.querySelectorAll('#epTC .ep-cb').forEach(b=>b.classList.toggle('on',b.dataset.c===sty.textColor));
  document.querySelectorAll('#epNC .ep-cb').forEach(b=>b.classList.toggle('on',b.dataset.c===sty.noteColor));
  document.querySelectorAll('#epPC .ep-cb').forEach(b=>b.classList.toggle('on',b.dataset.c===sty.photoColor));
  $('epPhDel').style.display=l.photo?'block':'none';
  $('epAuName').textContent=l.audio?'✓ 음성파일 업로드됨':'';
  $('epAuDel').style.display=l.audio?'block':'none';
  const isUrl=l.video&&l.video.startsWith('http');
  $('epVTF').classList.toggle('on',!isUrl); $('epVTU').classList.toggle('on',isUrl);
  $('epVF').classList.toggle('hide',isUrl); $('epVU').classList.toggle('hide',!isUrl);
  $('epVUrl').value=isUrl?l.video:'';
  $('epViName').textContent=(!isUrl&&l.video)?'✓ 영상파일 업로드됨':'';
  $('epViDel').style.display=l.video?'block':'none';
  renderFpGrid();
  panel.classList.add('on');
}
function closeEditor(){ panel.classList.remove('on'); editIdx=-1; }
$('epClose').addEventListener('click',closeEditor);

// 실시간 미리보기 헬퍼
function liveFr(){ return editIdx>=0?document.querySelectorAll('.lpage')[editIdx]?.querySelector(`#fr${editIdx}`):null; }
function liveNb(){ return liveFr()?.querySelector('.nbody')||null; }
function liveNf(){ return liveFr()?.querySelector('.nfrom')||null; }
function livePf(){ return editIdx>=0?document.querySelectorAll('.lpage')[editIdx]?.querySelector(`#pf${editIdx}`):null; }

// 폰트
document.querySelectorAll('#epFonts .ep-fb').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('#epFonts .ep-fb').forEach(b=>b.classList.remove('on')); btn.classList.add('on');
    if(editIdx<0)return;
    const sty=letters[editIdx].style||defStyle(); sty.fontFamily=btn.dataset.f; letters[editIdx].style=sty;
    const nb=liveNb(); if(nb) nb.style.fontFamily=`'${btn.dataset.f}',cursive`;
  });
});
// 크기
$('epSize').addEventListener('input',e=>{
  if(editIdx<0)return;
  const sty=letters[editIdx].style||defStyle(); sty.fontSize=parseFloat(e.target.value); letters[editIdx].style=sty;
  const nb=liveNb(); if(nb) nb.style.fontSize=e.target.value+'rem';
});
// 글씨색
document.querySelectorAll('#epTC .ep-cb').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('#epTC .ep-cb').forEach(b=>b.classList.remove('on')); btn.classList.add('on');
    if(editIdx<0)return;
    const sty=letters[editIdx].style||defStyle(); sty.textColor=btn.dataset.c; letters[editIdx].style=sty;
    const nb=liveNb(); if(nb) nb.style.color=btn.dataset.c;
    const nf=liveNf(); if(nf) nf.style.color=btn.dataset.c;
  });
});
// 노트색
document.querySelectorAll('#epNC .ep-cb').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('#epNC .ep-cb').forEach(b=>b.classList.remove('on')); btn.classList.add('on');
    if(editIdx<0)return;
    const sty=letters[editIdx].style||defStyle(); sty.noteColor=btn.dataset.c; letters[editIdx].style=sty;
    const fr=liveFr(); if(fr) fr.style.background=btn.dataset.c;
  });
});
// 사진색
document.querySelectorAll('#epPC .ep-cb').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('#epPC .ep-cb').forEach(b=>b.classList.remove('on')); btn.classList.add('on');
    if(editIdx<0)return;
    const sty=letters[editIdx].style||defStyle(); sty.photoColor=btn.dataset.c; letters[editIdx].style=sty;
    const pf=livePf(); if(pf) pf.style.background=btn.dataset.c;
  });
});

// 사진
$('epPhBtn').addEventListener('click',()=>$('epPhIn').click());
$('epPhIn').addEventListener('change',e=>{
  const f=e.target.files[0]; if(!f) return;
  if(f.size>5*1024*1024){toast('5MB 이하 사진만 가능해요!');e.target.value='';return;}
  const r=new FileReader();
  r.onload=ev=>{
    draft.photo=ev.target.result; $('epPhDel').style.display='block';
    const pf=livePf(),pi=document.querySelectorAll('.lpage')[editIdx]?.querySelector(`#pi${editIdx}`);
    if(pi){pi.src=ev.target.result;pi.classList.add('on');} if(pf)pf.classList.add('on');
    toast('사진 미리보기 적용됨');
  };
  r.readAsDataURL(f); e.target.value='';
});
$('epPhDel').addEventListener('click',()=>{
  draft.photo=''; $('epPhDel').style.display='none';
  const pf=livePf(),pi=document.querySelectorAll('.lpage')[editIdx]?.querySelector(`#pi${editIdx}`);
  if(pi){pi.src='';pi.classList.remove('on');} if(pf)pf.classList.remove('on');
});

// ── 떠다니는 사진 관리 ──
function renderFpGrid(){
  const grid=$('fpGrid'); grid.innerHTML='';
  fphotos.forEach((src,idx)=>{
    const div=document.createElement('div'); div.className='fp-thumb';
    const img=document.createElement('img'); img.src=src; div.appendChild(img);
    const del=document.createElement('div'); del.className='fp-del'; del.textContent='🗑 삭제';
    del.addEventListener('click',e=>{ e.stopPropagation(); fphotos.splice(idx,1); saveFphotos(); renderFpGrid(); updateAllFloatPhotos(); });
    div.appendChild(del); grid.appendChild(div);
  });
}
function updateAllFloatPhotos(){
  document.querySelectorAll('.float-photos').forEach(con=>renderFloatPhotos(con));
}
$('epFpBtn').addEventListener('click',()=>$('epFpIn').click());
$('epFpIn').addEventListener('change',e=>{
  Array.from(e.target.files).forEach(f=>{
    if(f.size>3*1024*1024){toast('사진은 3MB 이하만 가능해요!');return;}
    const r=new FileReader();
    r.onload=ev=>{ fphotos.push(ev.target.result); saveFphotos(); renderFpGrid(); updateAllFloatPhotos(); };
    r.readAsDataURL(f);
  });
  e.target.value='';
});

// 음성
$('epAuBtn').addEventListener('click',()=>$('epAuIn').click());
$('epAuIn').addEventListener('change',e=>{
  const f=e.target.files[0]; if(!f) return;
  if(f.size>50*1024*1024){toast('50MB 이하 파일만 가능해요!');e.target.value='';return;}
  toast('음성 읽는 중...');
  const r=new FileReader();
  r.onload=ev=>{ draft.audio=ev.target.result; $('epAuName').textContent=`✓ ${f.name}`; $('epAuDel').style.display='block'; toast('음성 준비됨 — 저장 눌러주세요'); };
  r.readAsDataURL(f); e.target.value='';
});
$('epAuDel').addEventListener('click',()=>{ draft.audio=''; $('epAuName').textContent=''; $('epAuDel').style.display='none'; });

// 영상 탭
$('epVTF').addEventListener('click',()=>{ $('epVTF').classList.add('on');$('epVTU').classList.remove('on');$('epVF').classList.remove('hide');$('epVU').classList.add('hide'); });
$('epVTU').addEventListener('click',()=>{ $('epVTU').classList.add('on');$('epVTF').classList.remove('on');$('epVU').classList.remove('hide');$('epVF').classList.add('hide'); });
$('epViBtn').addEventListener('click',()=>$('epViIn').click());
$('epViIn').addEventListener('change',e=>{
  const f=e.target.files[0]; if(!f) return;
  if(f.size>200*1024*1024){toast('200MB 이하 파일만 가능해요!');e.target.value='';return;}
  toast('영상 읽는 중...');
  const r=new FileReader();
  r.onload=ev=>{ draft.video=ev.target.result; $('epViName').textContent=`✓ ${f.name}`; $('epViDel').style.display='block'; toast('영상 준비됨 — 저장 눌러주세요'); };
  r.readAsDataURL(f); e.target.value='';
});
$('epVUrlSave').addEventListener('click',()=>{
  const url=$('epVUrl').value.trim(); draft.video=url;
  $('epViDel').style.display=url?'block':'none';
  toast(url?'URL 입력됨 — 저장 눌러주세요':'URL 삭제됨');
});
$('epViDel').addEventListener('click',()=>{ draft.video=''; $('epVUrl').value=''; $('epViName').textContent=''; $('epViDel').style.display='none'; });

// 저장
$('epSave').addEventListener('click',async()=>{
  if(editIdx<0) return;
  const from=$('epName').value.trim()||letters[editIdx].from;
  const body=$('epBody').value.trim();
  letters[editIdx]={
    ...letters[editIdx], from, body,
    photo: draft.photo!==undefined?draft.photo:letters[editIdx].photo,
    audio: draft.audio!==undefined?draft.audio:letters[editIdx].audio,
    video: draft.video!==undefined?draft.video:letters[editIdx].video,
  };
  await apiSave(letters);
  closeEditor(); render();
});

// 관리자
const abadge=$('abadge');
$('adminBtn').addEventListener('click',()=>{
  if(adminMode){ adminMode=false; abadge.classList.remove('on'); closeEditor(); render(); return; }
  $('pwIn').value=''; $('pwErr').textContent=''; openMo('moPw'); setTimeout(()=>$('pwIn').focus(),120);
});
$('pwOk').addEventListener('click',checkPw);
$('pwIn').addEventListener('keydown',e=>{ if(e.key==='Enter') checkPw(); });
function checkPw(){
  if($('pwIn').value===PW){ closeMo('moPw'); adminMode=true; abadge.classList.add('on'); render(); }
  else { $('pwErr').textContent='비밀번호가 틀렸어요 💛'; $('pwIn').value=''; $('pwIn').focus(); }
}
$('btnAdd').addEventListener('click',()=>{ $('addIn').value=''; $('addErr').textContent=''; openMo('moAdd'); setTimeout(()=>$('addIn').focus(),120); });
$('addOk').addEventListener('click',doAdd);
$('addIn').addEventListener('keydown',e=>{ if(e.key==='Enter') doAdd(); });
async function doAdd(){
  const v=$('addIn').value.trim(); if(!v){$('addErr').textContent='이름을 입력해주세요';return;}
  letters.push({from:v,body:'',photo:'',audio:'',video:'',style:defStyle()});
  closeMo('moAdd'); render(); await apiSave(letters);
  setTimeout(()=>{ const ps=document.querySelectorAll('.lpage'); ps[ps.length-1]?.scrollIntoView({behavior:'smooth'}); },350);
}

// INIT
(async()=>{
  try{ letters=await apiLoad(); }
  catch(e){ letters=Array.from({length:13},(_,i)=>({from:`제자 ${i+1}`,body:'',photo:'',audio:'',video:'',style:defStyle()})); }
  letters=letters.map(l=>({video:'',audio:'',photo:'',style:defStyle(),...l,style:{...defStyle(),...(l.style||{})}}));
  render();
  const ls=$('ls'); ls.classList.add('hide'); setTimeout(()=>ls.remove(),600);
})();
</script>
